# Node API + PostgreSQL on Render. Static site (kns.edu.sl) calls this API.

databases:
  - name: kns-college-db
    plan: free
    databaseName: kns_college
    user: kns_college

services:
  - type: web
    name: kns-college-backend
    env: node
    plan: free
    buildCommand: npm install && npm run db:migrate && npm run db:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kns-college-db
          property: connectionString
      # Set in Render dashboard (Secrets):
      # KNS_ADMIN_API_KEY
      # PAYMENT_STATUS_SECRET
      # BREVO_API_KEY, BREVO_SCHOLARSHIP_EMAIL, BREVO_CONTACT_EMAIL, BREVO_ENQUIRY_EMAIL, BREVO_TRAINING_EMAIL
      # MONIME_ACCESS_TOKEN, MONIME_SPACE_ID
      # MONIME_REQUIRE_LIVE_TOKEN=true
      # MONIME_ALLOWED_CHECKOUT_ORIGINS=https://kns.edu.sl,https://www.kns.edu.sl
      # CORS_ORIGIN (optional extra allowed origins, comma-separated)
