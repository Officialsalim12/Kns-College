# Node API for kns.edu.sl — the website files themselves go on Sector Link.

services:
  - type: web
    name: kns-college-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Secrets go in the Render dashboard:
      # SUPABASE_URL, SUPABASE_ANON_KEY
      # SENDGRID_API_KEY, SENDGRID_FROM_EMAIL, SENDGRID_TO_EMAIL
      # MONIME_ACCESS_TOKEN, MONIME_SPACE_ID
      # MONIME_REQUIRE_LIVE_TOKEN=true
      # MONIME_ALLOWED_CHECKOUT_ORIGINS=https://kns.edu.sl,https://www.kns.edu.sl
