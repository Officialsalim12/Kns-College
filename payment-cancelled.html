<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Payment Cancelled — KNS College</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-payment-result page-payment-result--cancelled">

    <div class="payment-result-overlay" id="payment-result-overlay">
        <div class="payment-result-backdrop" aria-hidden="true"></div>

        <div
            class="payment-result-modal"
            role="dialog"
            aria-modal="true"
            aria-labelledby="payment-result-dialog-title"
            aria-describedby="payment-result-dialog-desc"
            tabindex="-1"
            aria-busy="true"
        >
            <button type="button" class="payment-result-modal__close" data-payment-result-close aria-label="Close dialog">×</button>

            <header class="payment-result-hero">
                <div class="payment-result-hero__icon-wrap payment-result-hero__icon-wrap--cancelled" aria-hidden="true">
                    <span class="payment-result-hero__calendar" aria-hidden="true">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" aria-hidden="true">
                            <rect x="8" y="14" width="32" height="28" rx="4" fill="#fff" stroke="#fdba74" stroke-width="2"/>
                            <path d="M8 20h32" stroke="#fdba74" stroke-width="2"/>
                            <rect x="8" y="10" width="32" height="10" rx="4" fill="#f97316"/>
                        </svg>
                    </span>
                </div>
                <h1 id="payment-result-dialog-title" class="payment-result-hero__title payment-result-hero__title--cancelled">Payment Cancelled</h1>
                <p class="payment-result-hero__lead">Your payment was cancelled and no charges were made.</p>
            </header>

            <div id="payment-result-dialog-desc" class="payment-result-modal__body">
                <p id="payment-result-loading" class="payment-result-loading">Loading…</p>

                <div class="payment-result-highlight payment-result-highlight--cancelled" role="note">
                    <span class="payment-result-highlight__graphic payment-result-highlight__graphic--hourglass" aria-hidden="true">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M6 2h12v4l-4 4 4 4v4H6v-4l4-4-4-4V2z" stroke="#ea580c" stroke-width="1.75" fill="#ffedd5"/>
                            <path d="M8 6h8M8 18h8" stroke="#ea580c" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </span>
                    <p class="payment-result-highlight__text">
                        You can complete your purchase anytime when you&apos;re ready.
                    </p>
                </div>

                <p id="payment-result-course-line" class="payment-result-course" hidden></p>

                <div class="payment-result-section">
                    <h2 class="payment-result-section__title">What can you do?</h2>
                    <p class="payment-result-steps-text">Return to the course page to continue learning about the course.</p>
                </div>

                <div class="payment-result-actions payment-result-actions--single">
                    <a id="payment-cancelled-retry" class="payment-result-btn payment-result-btn--outline payment-result-btn--primary" href="online-courses.html">Return to Course</a>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="payment-result.js"></script>
    <script src="payment-result-a11y.js"></script>
</body>
</html>
