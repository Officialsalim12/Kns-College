
services:
  kns-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kns-college-app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Mount logs directory for persistent logs
      - ./logs:/app/logs
      # Mount .env.local file explicitly
      - ./.env.local:/app/.env.local:ro
    restart: unless-stopped
    networks:
      - kns-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  kns-network:
    driver: bridge
